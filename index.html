<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COREXIA (CXA) core</title>
  <meta name="description" content="CXA core - A next-generation material management system for professionals." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background-color: #f8fafc;
    }

    .font-mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 0;
      }

      /* すべてのスクロールバーを非表示にする */
      * {
        -ms-overflow-style: none !important;
        scrollbar-width: none !important;
      }

      *::-webkit-scrollbar {
        display: none !important;
      }

      header,
      footer,
      .no-print,
      nav,
      button,
      .sidebar-container,
      .no-print-overlay {
        display: none !important;
      }

      html,
      body,
      #root {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        height: auto !important;
        min-height: 100% !important;
        overflow: visible !important;
      }

      /* プレビューコンテナを印刷可能なブロックにする */
      .print-preview-container {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        display: block !important;
        background: white !important;
        z-index: 9999 !important;
      }

      #print-target {
        display: block !important;
        visibility: visible !important;
        width: 100% !important;
        height: auto !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: visible !important;
      }

      #print-target>div {
        display: block !important;
        box-shadow: none !important;
        border: none !important;
        margin: 0 !important;
        padding: 0 !important;
        page-break-after: always !important;
        page-break-inside: avoid !important;
        height: 297mm !important;
        overflow: hidden !important;
      }

      #print-target>div:last-child {
        page-break-after: auto !important;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",

    "firebase/firestore": "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0",
    "firebase/": "https://esm.sh/firebase@^12.9.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "xlsx": "https://esm.sh/xlsx@^0.18.5"
  }
}
</script>

</head>

<body class="bg-slate-50 text-slate-900 antialiased selection:bg-blue-100 selection:text-blue-900">

</html>
