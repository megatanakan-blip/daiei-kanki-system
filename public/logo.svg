<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#005c9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a3e0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Circle Container -->
  <circle cx="50" cy="50" r="45" stroke="url(#gradBlue)" stroke-width="2" fill="url(#gradBlue)" fill-opacity="0.03" />
  
  <!-- Connected CXA Graphic -->
  <g transform="translate(18, 30) scale(0.65)">
     <!-- C shape (Left) -->
     <path d="M40 10 A 30 30 0 1 0 40 70" stroke="url(#gradBlue)" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#shadow)" />
     
     <!-- X shape connecting C to A -->
     <!-- Upper-left of X connects to top of C, Lower-right goes to A leg -->
     <path d="M40 10 L 80 70" stroke="url(#gradBlue)" stroke-width="8" stroke-linecap="round"  filter="url(#shadow)" />
     <!-- Lower-left of X connects to bottom of C, Upper-right goes to peak of A -->
     <path d="M40 70 L 80 10" stroke="url(#gradBlue)" stroke-width="8" stroke-linecap="round"  filter="url(#shadow)" />
     
     <!-- A shape (Right) connected from X -->
     <path d="M80 10 L 100 70" stroke="url(#gradBlue)" stroke-width="8" stroke-linecap="round"  filter="url(#shadow)" />
     <path d="M85 50 L 95 50" stroke="url(#gradBlue)" stroke-width="8" stroke-linecap="round"  filter="url(#shadow)" />
  </g>

  <!-- Text Section -->
  <text x="120" y="55" font-family="'Inter', sans-serif" font-weight="900" font-size="34" fill="#003462" letter-spacing="-0.5">COREXIA</text>
  <text x="120" y="90" font-family="'Inter', sans-serif" font-weight="700" font-size="28" fill="#005c9c" letter-spacing="2">CORE</text>
</svg>
